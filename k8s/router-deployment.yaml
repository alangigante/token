apiVersion: apps/v1
kind: Deployment
metadata:
  name: cell-router
  namespace: camada-zero
  labels:
    app: cell-router
    tier: routing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cell-router
  template:
    metadata:
      labels:
        app: cell-router
        tier: routing
    spec:
      containers:
        - name: router
          image: poc-cell-oauth:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cell-router
  namespace: camada-zero
spec:
  type: LoadBalancer
  selector:
    app: cell-router
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
