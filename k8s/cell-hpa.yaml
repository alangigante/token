apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: oauth-cell-hpa
  namespace: camada-zero
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: oauth-cell
  # Min 4 cells (N-1 rule with tolerance for 1 failure)
  # Max 8 cells (can tolerate 2 simultaneous failures)
  minReplicas: 4
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Target 75% = (N-1)/N where N=4
          # Leaves 25% headroom for failover absorption
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
