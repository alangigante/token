apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth-cell
  namespace: camada-zero
  labels:
    app: oauth-cell
    tier: cell
spec:
  # Start with 4 replicas — N-1 rule: each handles 75% capacity
  # If 1 fails, remaining 3 absorb 100% total load
  replicas: 4
  selector:
    matchLabels:
      app: oauth-cell
  template:
    metadata:
      labels:
        app: oauth-cell
        tier: cell
    spec:
      containers:
        - name: cell
          image: poc-cell-oauth:latest
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"
            - name: ROUTER_ADDR
              value: "cell-router.camada-zero.svc.cluster.local:80"
            - name: CELL_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            # Sized for N-1 rule: resources allow 133% of normal load
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: oauth-cell
  namespace: camada-zero
spec:
  clusterIP: None  # Headless service — router addresses cells individually
  selector:
    app: oauth-cell
  ports:
    - port: 8081
      targetPort: 8081
